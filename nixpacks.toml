# ============================================
# Nixpacks build config for Railway
# ============================================
# Railway uses Nixpacks as its build system.
# This tells it:
#   1. Where your app root is (the repo root, not app/)
#   2. Which requirements file to use
#   3. How to start the server


[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
