name: aegis-g-base

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis_app
    ports:
      - "3000:3000"
      - "8000:8000"
    volumes:
      - ./app:/workspace/app
      - ./frontend:/workspace/frontend
      - app_node_modules:/workspace/frontend/node_modules
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/aegis_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    container_name: aegis_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=aegis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aegis_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  app_node_modules:
