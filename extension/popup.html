<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AEGIS-G Scanner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span>AEGIS-G</span>
      </div>
      <div id="status-indicator" class="status-dot offline"></div>
    </div>

    <!-- Chat messages container -->
    <div id="messages" class="messages">
      <div class="message assistant">
        <div class="message-icon assistant-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div class="message-content">
          <p>AEGIS-G Threat Scanner ready. Upload text or images for analysis.</p>
        </div>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <!-- Image preview -->
      <div id="image-preview" class="image-preview hidden">
        <img id="preview-img" src="" alt="Preview">
        <button id="remove-image" class="remove-image">✕</button>
      </div>

      <!-- Input box -->
      <div class="input-box">
        <button id="attach-btn" class="attach-btn" title="Attach image">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        
        <textarea 
          id="user-input" 
          placeholder="Enter text or paste image for threat analysis..."
          rows="1"
        ></textarea>
        
        <button id="send-btn" class="send-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

      <!-- Settings button -->
      <button id="settings-btn" class="settings-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v6m0 6v6M5.64 5.64l4.24 4.24m4.24 4.24l4.24 4.24M1 12h6m6 0h6M5.64 18.36l4.24-4.24m4.24-4.24l4.24-4.24"/>
        </svg>
        API Settings
      </button>
    </div>

    <!-- Settings panel -->
    <div id="settings-panel" class="settings-panel hidden">
      <div class="settings-header">
        <span>API Configuration</span>
        <button id="close-settings">✕</button>
      </div>
      <div class="settings-body">
        <label>
          <span>Backend URL</span>
          <input type="text" id="api-url" placeholder="http://localhost:8000" value="http://localhost:8000">
        </label>
        <label>
          <span>Auth Token (optional)</span>
          <input type="password" id="api-token" placeholder="Bearer token...">
        </label>
        <button id="save-settings" class="btn-primary">Save Settings</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
