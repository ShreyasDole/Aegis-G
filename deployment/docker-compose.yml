version: '3.8'

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg15
    container_name: aegis-postgres
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis_password
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── Neo4j Graph Database ─────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: aegis-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.backend
    container_name: aegis-backend
    environment:
      DATABASE_URL:    postgresql://aegis:aegis_password@db:5432/aegis
      NEO4J_URI:       bolt://neo4j:7687
      NEO4J_USER:      neo4j
      NEO4J_PASSWORD:  password
      GEMINI_API_KEY:  ${GEMINI_API_KEY}
      GEMINI_FLASH_MODEL: ${GEMINI_FLASH_MODEL:-gemini-2.5-flash}
      SECRET_KEY:      ${SECRET_KEY:-change-this-to-a-secure-random-string}
      ALGORITHM:       HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENVIRONMENT:     ${ENVIRONMENT:-development}
      LOG_LEVEL:       ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ../app:/app/app       # live-reload code changes
      - ../storage:/app/storage
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
    container_name: aegis-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ../frontend/src:/app/src      # live-reload source changes
      - ../frontend/public:/app/public
    command: npm run dev
    restart: unless-stopped


volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
